<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Maintenance</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e293b);

color:white;

}

.container{

text-align:center;

padding:30px;

max-width:400px;

}

.icon{

font-size:90px;

margin-bottom:20px;

animation:rotate 2s linear infinite;

}

h1{

font-size:32px;

margin-bottom:15px;

}

p{

font-size:18px;

line-height:1.6;

opacity:.9;

margin-bottom:30px;

}

button{

width:220px;

height:55px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

@keyframes rotate{

0%{

transform:rotate(0deg);

}

100%{

transform:rotate(360deg);

}

}

</style>

</head>

<body>

<div class="container">

<div class="icon">

🛠️

</div>

<h1>

VideoCircle

</h1>

<p>

The app is currently under maintenance.

Please try again later.

</p>

<button onclick="location.reload()">

🔄 Try Again

</button>

</div>

</body>

</html>
