<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Video</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.header{
    background:#000;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#000;
    color:white;
    font-size:18px;
    margin-top:10px;
}

input[type="text"],
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.preview{
    width:100%;
    border-radius:10px;
    margin-top:15px;
    display:none;
}

</style>
</head>

<body>

<div class="header">
🎬 Upload Video
</div>

<div class="container">

<h2>Create New Post</h2>

<button onclick="openCamera()">
📹 Record Video
</button>

<button onclick="openGallery()">
📁 Select From Gallery
</button>

<input
type="file"
id="cameraInput"
accept="video/*"
capture
style="display:none;">

<input
type="file"
id="galleryInput"
accept="video/*"
style="display:none;">

<video
id="previewVideo"
class="preview"
controls>
</video>

<input
type="text"
id="title"
placeholder="Video Title">

<textarea
id="description"
rows="4"
placeholder="Video Description">
</textarea>

<div id="uploadStatus"
style="
display:none;
margin-top:15px;
text-align:center;
font-weight:bold;
">

<div id="uploadText">
Uploading...
</div>

<progress
id="progressBar"
value="0"
max="100"
style="
width:100%;
height:20px;
margin-top:10px;">
</progress>

<div id="progressPercent">
0%
</div>

</div>

<button
id="uploadBtn"
onclick="uploadVideo()">
🚀 Upload Video
</button>
<div id="bannerAd" style="
width:100%;
height:60px;
margin-top:20px;
border:1px dashed #999;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
color:#666;
background:#fafafa;
">

Banner Ad Area

</div>
</div>

<script type="module">

import {
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
auth,
db
} from "./firebase.js";
import {
    initializeAds
} from "./ads.js";
  initializeAds();
// ===============================
// Upload Permission Check
// ===============================

const settingsSnap = await getDoc(
    doc(db, "settings", "app")
);

if (settingsSnap.exists()) {

    const settings = settingsSnap.data();

    if (settings.upload === false) {

        document.querySelector(".container").innerHTML = `

        <div style="
        text-align:center;
        padding:40px;
        ">

        <h1>🚫</h1>

        <h2>Upload Disabled</h2>

        <p>

        Video uploads are currently disabled by the administrator.

        </p>

        </div>

        `;

        throw new Error("Upload Disabled");

    }

}
window.openCamera = function(){
document.getElementById("cameraInput").click();
}

window.openGallery = function(){
document.getElementById("galleryInput").click();
}

const preview =
document.getElementById("previewVideo");

document
.getElementById("cameraInput")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

preview.src=
URL.createObjectURL(file);

preview.style.display="block";

}

});

document
.getElementById("galleryInput")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

preview.src=
URL.createObjectURL(file);

preview.style.display="block";

}

});

window.uploadVideo = async function(){

const user = auth.currentUser;

if (!user) {
    alert("Please Login Again");
    return;
}
  
document.getElementById("uploadBtn").disabled = true;

document.getElementById("uploadBtn").innerText =
"Uploading...";

let file =
document.getElementById("cameraInput").files[0] ||
document.getElementById("galleryInput").files[0];

if(!file){
alert("Please Select Video");
return;
}

const title =
document.getElementById("title").value;

const description =
document.getElementById("description").value;

const formData = new FormData();

formData.append("file", file);
formData.append("upload_preset", "videocircle");
document.getElementById(
"uploadStatus"
).style.display = "block";

document.getElementById(
"uploadText"
).innerText = "Uploading Video...";

try{

let progress = 0;

const progressInterval =
setInterval(()=>{

progress += 5;

document.getElementById(
"progressBar"
).value = progress;

document.getElementById(
"progressPercent"
).innerText =
progress + "%";

if(progress >= 90){

clearInterval(
progressInterval
);

}

},500);

const response = await fetch(
"https://api.cloudinary.com/v1_1/duerkkpjf/video/upload",
{
method:"POST",
body:formData
});

const data = await response.json();

const videoUrl = data.secure_url;
const publicId = data.public_id;
  const thumbnailUrl =
`https://res.cloudinary.com/duerkkpjf/video/upload/so_1/${publicId}.jpg`;
clearInterval(progressInterval);

document.getElementById(
"progressBar"
).value = 100;

document.getElementById(
"progressPercent"
).innerText = "100%";

document.getElementById(
"uploadText"
).innerText =
"Processing Video...";

document.getElementById("uploadText").innerText =
"✅ Upload Successful";

document.getElementById("uploadBtn").innerText =
"Upload Complete ✅";

await addDoc(collection(db,"videos"),{

title:title,

description:description,

videoUrl:videoUrl,

thumbnailUrl:thumbnailUrl,

publicId:publicId,

channelName:localStorage.getItem("channelName"),

userId:user.uid,

likes:0,

views:0,

comments:0,

createdAt:Date.now()

});

localStorage.setItem(
"videoTitle",
title
);

localStorage.setItem(
"videoDescription",
description
);

document.getElementById(
"uploadText"
).innerText =
"Upload Complete ✅";

window.location.href="home.html";

}catch(error){
  alert(error.message);
  console.log(error);
  
  document.getElementById("uploadBtn").disabled = false;

document.getElementById("uploadBtn").innerText =
"🚀 Upload Video";
  
}

}

  const titleInput =
document.getElementById("title");

const descriptionInput =
document.getElementById("description");

function scrollIntoViewSmooth(element){

    setTimeout(()=>{

        element.scrollIntoView({

            behavior:"smooth",

            block:"center"

        });

    },300);

}
titleInput.addEventListener("focus",()=>{

    scrollIntoViewSmooth(titleInput);

});

descriptionInput.addEventListener("focus",()=>{

    scrollIntoViewSmooth(descriptionInput);

});
  
const CLOUD_NAME = "duerkkpjf";
const UPLOAD_PRESET = "videocircle";

</script>

</body>
</html>
