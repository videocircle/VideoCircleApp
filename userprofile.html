<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-container{
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

.profile-pic{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid black;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
}

#userVideos{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.video-card{

position:relative;

border-radius:12px;

overflow:hidden;

background:#000;

cursor:pointer;

}

.video-thumb{

position:relative;

width:100%;

height:220px;

}

.video-thumb-img{

width:100%;

height:100%;

object-fit:cover;

display:block;

}

.play-btn{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:60px;
height:60px;

border-radius:50%;

background:rgba(0,0,0,.55);

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

color:white;

font-weight:bold;

pointer-events:none;

}

.follow-btn{
width:100%;
padding:12px;
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="profile-container">

<img
id="profilePic"
class="profile-pic"
src="https://via.placeholder.com/150">

<h1 id="channelName">
Loading...
</h1>

<h3 id="fullName"></h3>

<button
id="followBtn"
class="follow-btn"
onclick="followUser()">
Follow
</button>

<div class="stats">

<div>
<h2 id="videoCount">0</h2>
<p>Videos</p>
</div>

<div>
<h2 id="followersCount">0</h2>
<p>Followers</p>
</div>

<div>
<h2 id="followingCount">0</h2>
<p>Following</p>
</div>

</div>

<h2>Videos</h2>

<div id="userVideos"></div>

</div>

<script type="module" src="userprofile.js"></script>

</body>
</html>
