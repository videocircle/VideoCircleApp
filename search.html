<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Search</title>

<style>

body{
margin:0;
padding:15px;
font-family:Arial;
background:#f5f5f5;
}

#searchInput{
width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

#results{
margin-top:15px;
}

.user-card{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:white;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.user-card img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>
<body>

<input
type="text"
id="searchInput"
placeholder="Search Channel..."
oninput="searchUsers()">

<div id="results"></div>

<script type="module" src="search.js"></script>

</body>
</html>
